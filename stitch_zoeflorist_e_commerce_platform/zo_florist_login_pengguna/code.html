<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->

</div>
<!-- Password Field -->

<label class="block font-label-md text-label-md text-outline uppercase tracking-widest mb-1" for="password">Kata Sandi</label>
<input class="w-full py-4 px-0 form-input-custom font-body-md text-body-md text-on-surface focus:ring-0" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-0 bottom-4 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Checkbox & Forgot Password -->
<div class="flex items-center justify-between">
<label class="flex items-center cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 border-outline-variant text-primary rounded-sm focus:ring-primary/20 transition-all" type="checkbox"/>
<div class="absolute inset-0 pointer-events-none opacity-0 peer-checked:opacity-100 flex items-center justify-center text-white">

</div>
<span class="ml-2 font-body-md text-body-md text-on-surface-variant group-hover:text-primary transition-colors">Ingat Saya</span>

<div class="fixed top-0 right-0 p-8 pointer-events-none opacity-20 md:opacity-5">
<span class="material-symbols-outlined text-[120px] text-tertiary">spa</span>
</div>
<!-- Interaction Script -->
<script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = form.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                btn.disabled = true;
                
                // Simulate loading
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert('Login processing simulatied for: ' + document.getElementById('email').value);
                }, 1500);
            });
        });

        // Visibility Toggle for Password
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        toggleBtn?.addEventListener('click', () => {
            const isPassword = passInput.type === 'password';
            passInput.type = isPassword ? 'text' : 'password';
            toggleBtn.innerHTML = isPassword ? '<span class="material-symbols-outlined">visibility_off</span>' : '<span class="material-symbols-outlined">visibility</span>';
        });
    </script>
