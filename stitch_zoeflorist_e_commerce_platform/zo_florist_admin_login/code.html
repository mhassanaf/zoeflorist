                    "surface-variant": "#f0dfd8",

<style>
        body {
            background-color: #FAF4F0;
            overflow-x: hidden;
        }
        
        .floral-texture {
            background-image: radial-gradient(#D2C9C4 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.15;
        }

        .login-card {
            box-shadow: 0 10px 40px -10px rgba(94, 82, 77, 0.08);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-focus-effect:focus {
            box-shadow: 0 0 0 4px rgba(247, 197, 181, 0.3);
            border-color: #7b5549;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }

        .btn-hover-effect {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover-effect:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Decorative Subtle Background -->
<div class="fixed inset-0 floral-texture pointer-events-none z-0"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile relative z-10 py-12">
<div class="w-full max-w-[440px]">
<!-- Brand Identity Anchor -->
<div class="mb-12 text-center">
<img alt="Zoéflorist Logo" class="h-20 mx-auto mb-8 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLu7X13OLmx3jf08cI-uJP4g6rsvEjOfNuvKba61QRQgl2suFAWlU2dOovHvQ8Sfb0L_L8eKLNqRf0ZJCOBXnCT0eBbEjCUW-ysbq9-3Cd-k1OOBBGnzGntjvFwESEnUZD6OcOhMmy5_cOdQbgiSWZhDDOWz48D7UtvATopK8O03tAQ7T1s7r6X4IhjS_RmIOntRq7X_i0vrT3Z5kUD2WvJZDwQOgIpt-oxC52I4Tl26bq5re3tM4IBJ07DC"/>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Admin Login</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Masuk untuk mengelola koleksi bunga Anda</p>
</div>
<!-- Login Container (Bento-style card) -->
<div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-xl p-8 md:p-10 login-card border border-surface-variant">
<form class="space-y-6" id="adminLoginForm" onsubmit="return false">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-widest" for="email">Alamat Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low/50 border-0 border-b-2 border-outline-variant/30 rounded-lg font-body-md text-body-md focus:ring-0 input-focus-effect transition-all placeholder:text-outline-variant/60" id="email" name="email" placeholder="nama@zoeflorist.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-widest" for="password">Kata Sandi</label>
<a class="text-caption font-label-md text-primary hover:underline transition-all" href="#">Lupa sandi?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low/50 border-0 border-b-2 border-outline-variant/30 rounded-lg font-body-md text-body-md focus:ring-0 input-focus-effect transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passToggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full py-5 bg-[#9E3B3B] text-white font-label-md text-label-md rounded-full shadow-lg shadow-secondary/20 uppercase tracking-widest btn-hover-effect flex items-center justify-center gap-2" type="submit">
<span>Masuk ke Dashboard</span>
<span class="material-symbols-outlined text-base">arrow_forward</span>
</button>
</div>
<!-- Simple Help Text -->
<div class="text-center pt-2">
<p class="font-caption text-caption text-on-surface-variant italic">Hanya untuk penggunaan internal administrator.</p>
</div>
</form>
</div>
</div>
</main>
<!-- Minimalist Footer (from Shared Components) -->
<footer class="w-full py-12 bg-surface-container-high relative z-10 mt-auto">
<div class="max-w-container-max mx-auto px-margin-desktop grid grid-cols-1 md:grid-cols-2 gap-gutter items-center">
<div class="text-center md:text-left">
<p class="font-body-md text-body-md text-on-surface-variant opacity-75">© 2024 Zoéflorist. Crafted for timeless romance.</p>
</div>
<div class="flex flex-wrap justify-center md:justify-end gap-x-8 gap-y-2">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</footer>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('passToggleIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Add a subtle entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
